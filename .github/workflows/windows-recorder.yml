name: Windows Recorder

on:
  push:
    paths:
      - "WindowsRecorder/**"
      - "RECORDING_FORMAT.md"
      - ".github/workflows/windows-recorder.yml"
  pull_request:
    paths:
      - "WindowsRecorder/**"
      - "RECORDING_FORMAT.md"
      - ".github/workflows/windows-recorder.yml"

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Install installer compiler
        run: choco install innosetup --yes --no-progress
      - name: Test, publish, and package
        shell: powershell
        run: .\WindowsRecorder\build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: AgentTrainer-Recorder-Windows
          if-no-files-found: error
          path: |
            WindowsRecorder/artifacts/AgentTrainer-Recorder-*-Setup-x64.exe
            WindowsRecorder/artifacts/AgentTrainer-Recorder-*-win-x64.zip
            WindowsRecorder/artifacts/SHA256SUMS.txt
